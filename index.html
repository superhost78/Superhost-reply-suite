/<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,sans-serif;background:#FAFAF7;min-height:100vh;}
input,textarea,select{font-family:inherit;}
input:focus,textarea:focus,select:focus{outline:none;border-color:#0D9488!important;box-shadow:0 0 0 3px #CCFBF1;}
button:active{transform:scale(0.98);}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.header{background:#fff;border-bottom:1px solid #E5E7EB;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#0D9488,#0F766E);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-text{font-size:16px;font-weight:800;color:#111827;letter-spacing:-0.4px;}
.logo-sub{font-size:11px;color:#6B7280;letter-spacing:0.4px;text-transform:uppercase;}
.badge{background:#CCFBF1;color:#0F766E;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;}
.tabs{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 28px;display:flex;overflow-x:auto;}
.tab{padding:14px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:#6B7280;border-bottom:2.5px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px;font-family:inherit;}
.tab.active{font-weight:700;border-bottom-color:currentColor;}
.main{max-width:680px;margin:0 auto;padding:32px 20px 80px;}
.tool-hero{margin-bottom:28px;}
.tool-eyebrow{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.tool-headline{font-size:24px;font-weight:800;color:#111827;letter-spacing:-0.5px;line-height:1.25;margin-bottom:6px;}
.tool-sub{font-size:14px;color:#6B7280;line-height:1.55;}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.field{margin-bottom:14px;}
.field-label{font-size:13px;font-weight:600;color:#111827;margin-bottom:6px;display:block;}
.field-optional{color:#6B7280;font-weight:400;}
.input{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:11px 14px;font-size:14px;color:#111827;}
.textarea{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:12px 14px;font-size:14px;color:#111827;line-height:1.65;resize:vertical;}
.select{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:11px 14px;font-size:14px;color:#111827;appearance:none;cursor:pointer;}
.char-count{font-size:11px;color:#6B7280;text-align:right;margin-top:3px;}
.tones{display:flex;gap:8px;flex-wrap:wrap;}
.tone{padding:8px 14px;border-radius:20px;cursor:pointer;border:1.5px solid #E5E7EB;background:#fff;color:#6B7280;font-size:13px;font-weight:500;font-family:inherit;}
.tone.active{border-color:#0D9488;background:#CCFBF1;color:#0F766E;font-weight:600;}
.btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#0D9488,#0F766E);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.btn:disabled{background:#E5E7EB;color:#6B7280;cursor:not-allowed;}
.output-card{background:#fff;border:1.5px solid #0D9488;border-radius:14px;padding:24px;margin-top:20px;box-shadow:0 0 0 4px #CCFBF1;animation:fadeIn 0.3s ease;}
.output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.output-label{font-size:11px;font-weight:700;color:#0F766E;letter-spacing:0.8px;text-transform:uppercase;}
.copy-btn{padding:7px 14px;background:#CCFBF1;color:#0F766E;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.output-text{font-size:15px;color:#111827;line-height:1.8;white-space:pre-wrap;}
.divider{height:1px;background:#E5E7EB;margin:18px 0;}
.regen-btn{width:100%;padding:11px;background:#F0FDFA;color:#0F766E;border:1px solid #CCFBF1;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.tip{background:#CCFBF1;border:1px solid #0D9488;border-radius:10px;padding:11px 14px;font-size:13px;color:#0F766E;margin-top:14px;line-height:1.5;}
.error{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:12px 14px;margin-top:14px;font-size:13px;color:#DC2626;}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle;}
.dispute-note{background:#F5F3FF;border:1px solid #DDD6FE;border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:#7C3AED;line-height:1.5;}
.footer{text-align:center;margin-top:40px;font-size:12px;color:#6B7280;}
.paywall-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.paywall-box{background:#fff;border-radius:20px;padding:36px 28px;max-width:420px;width:100%;text-align:center;animation:fadeIn 0.25s ease;}
.paywall-price{font-size:32px;font-weight:800;color:#0D9488;letter-spacing:-1px;}
.paywall-features{margin-top:14px;display:flex;flex-direction:column;gap:8px;text-align:left;}
.paywall-feature{font-size:13px;color:#111827;display:flex;align-items:center;gap:8px;}
.unlock-btn{display:block;width:100%;padding:15px;background:linear-gradient(135deg,#0D9488,#0F766E);color:#fff;border-radius:10px;font-size:15px;font-weight:700;text-decoration:none;margin-bottom:12px;}
.maybe-later{background:none;border:none;color:#6B7280;font-size:13px;cursor:pointer;font-family:inherit;}
.landing{min-height:100vh;background:#FAFAF7;}
.landing-hero{max-width:680px;margin:0 auto;padding:60px 24px 80px;text-align:center;}
.landing-badge{display:inline-block;background:#CCFBF1;color:#0F766E;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;letter-spacing:0.5px;margin-bottom:20px;}
.landing-h1{font-size:40px;font-weight:800;color:#111827;letter-spacing:-1px;line-height:1.15;margin-bottom:16px;}
.landing-p{font-size:16px;color:#6B7280;line-height:1.65;margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;}
.cta-btn{padding:16px 36px;background:linear-gradient(135deg,#0D9488,#0F766E);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:block;width:100%;max-width:320px;margin:0 auto 12px;}
.cta-sub{font-size:13px;color:#6B7280;margin-bottom:56px;}
.features-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;text-align:left;margin-bottom:56px;}
.feature-card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:18px;}
.feature-icon{font-size:22px;margin-bottom:8px;}
.feature-title{font-size:14px;font-weight:700;color:#111827;margin-bottom:4px;}
.feature-desc{font-size:13px;color:#6B7280;line-height:1.5;}
.pricing-box{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:32px;}
.pricing-price{font-size:28px;font-weight:800;color:#0D9488;letter-spacing:-0.5px;margin-bottom:4px;}
.pricing-sub{font-size:14px;color:#6B7280;margin-bottom:20px;}
</style>

<body>

<div id="app"></div>

<script>
const LS_CHECKOUT_URL = "https://superhost-reply-suite.lemonsqueezy.com/checkout/buy/b8287e90-5c5f-433f-b39f-3a830afb5fd2";
const TRIAL_DAYS = 3;
const TRIAL_MS = TRIAL_DAYS * 24 * 60 * 60 * 1000;
const STORAGE_KEY = "srs_trial_start";

function getTrialStart() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return parseInt(raw, 10);
    const now = Date.now();
    localStorage.setItem(STORAGE_KEY, String(now));
    return now;
  } catch { return Date.now(); }
}

function getTrialDaysRemaining() {
  const start = getTrialStart();
  const elapsed = Date.now() - start;
  const remaining = Math.ceil((TRIAL_MS - elapsed) / (1000 * 60 * 60 * 24));
  return Math.max(0, remaining);
}

function isPaywalled() { return getTrialDaysRemaining() === 0; }

const TOOLS = [
  { id:"bad", label:"Bad Review", icon:"🔴", color:"#DC2626", headline:"Turn a bad review into a trust signal", sub:"Future guests read how you respond more than what they said." },
  { id:"positive", label:"Positive Review", icon:"⭐", color:"#D97706", headline:"Say thank you like you mean it", sub:"Hosts who reply to great reviews get more great reviews." },
  { id:"neutral", label:"Neutral Review", icon:"🟡", color:"#0D9488", headline:"The 3-star review is the sneakiest threat", sub:"A lukewarm response handled well shows future guests who you are." },
  { id:"dispute", label:"Dispute & Flag", icon:"⚖️", color:"#7C3AED", headline:"Build your escalation case — word by word", sub:"Use the guest's own words to write a dispute Airbnb can't ignore." },
];

const TONES = ["Professional","Warm","Firm","Apologetic"];
const TONE_ICONS = {Professional:"🎩",Warm:"🤝",Firm:"⚖️",Apologetic:"🕊️"};

const BAD_ISSUES = ["Cleanliness complaint","Amenity not as described","Noise complaint","Check-in issue","Host communication","Safety concern (unfounded)","Retaliatory / suspected fake","Pricing / value complaint","Other"];
const DISPUTE_GROUNDS = ["Retaliatory review after dispute","Review violates Airbnb content policy","Guest caused damage and reviewed negatively","Review contains false factual claims","Guest broke house rules, then reviewed","Review left by wrong guest / error","Extortion attempt prior to review"];

let state = {
  page: "landing",
  activeTool: "bad",
  loading: false,
  outputs: {bad:"",positive:"",neutral:"",dispute:""},
  copied: false,
  showPaywall: false,
  daysRemaining: TRIAL_DAYS,
  error: "",
  fields: {
    bad: {review:"",issueType:"",tone:"Professional",propertyName:""},
    positive: {review:"",tone:"Warm",propertyName:"",stayHighlights:""},
    neutral: {review:"",tone:"Professional",propertyName:"",yourContext:""},
    dispute: {review:"",disputeGround:"",propertyName:"",yourContext:""},
  }
};

function setState(updates) {
  state = Object.assign({}, state, updates);
  render();
}

function setField(toolId, key, val) {
  state.fields[toolId][key] = val;
  // Only update the generate button state, not full re-render
  updateGenerateBtn();
}

function updateGenerateBtn() {
  const f = state.fields[state.activeTool];
  let can = false;
  if (state.activeTool === "bad") can = f.review.trim().length > 10 && !!f.issueType;
  else if (state.activeTool === "positive") can = f.review.trim().length > 10;
  else if (state.activeTool === "neutral") can = f.review.trim().length > 10;
  else if (state.activeTool === "dispute") can = f.review.trim().length > 10 && !!f.disputeGround;
  const btn = document.querySelector(".btn");
  if (btn) btn.disabled = !can || state.loading;
}

function buildPrompt(toolId) {
  const f = state.fields[toolId];
  const prop = f.propertyName ? ` for "${f.propertyName}"` : "";
  if (toolId === "bad") return `You are an expert Airbnb Superhost consultant. Generate a ${f.tone.toLowerCase()} public response to this bad review${prop}.\nComplaint: ${f.issueType}\nReview: "${f.review}"\nRules: Under 200 words. End with a forward-looking note. Do NOT start with Dear Guest. Write ONLY the response.`;
  if (toolId === "positive") return `You are an expert Airbnb Superhost consultant. Generate a ${f.tone.toLowerCase()} public thank-you response to this positive review${prop}.\nReview: "${f.review}"\n${f.stayHighlights ? "Host notes: "+f.stayHighlights : ""}\nRules: Under 150 words. Reference something specific. Sound like a real person. Invite them back. Write ONLY the response.`;
  if (toolId === "neutral") return `You are an expert Airbnb Superhost consultant. Generate a thoughtful public response to this neutral review${prop}.\nReview: "${f.review}"\n${f.yourContext ? "Context: "+f.yourContext : ""}\nRules: Under 180 words. Turn lukewarm into a trust signal. Write ONLY the response.`;
  if (toolId === "dispute") return `You are an expert Airbnb dispute specialist. Write a formal review removal request to Airbnb support${prop}.\nGrounds: ${f.disputeGround}\nReview: "${f.review}"\n${f.yourContext ? "Evidence: "+f.yourContext : ""}\nRules: Under 300 words. Reference Airbnb Review Policy. Request review removal. Write ONLY the dispute message.`;
}

async function generate() {
  if (isPaywalled()) { setState({showPaywall:true}); return; }
  const prompt = buildPrompt(state.activeTool);
  setState({loading:true, error:""});
  try {
    const res = await fetch("/api/generate", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||"").join("").trim();
    if (text) {
      const outputs = Object.assign({}, state.outputs, {[state.activeTool]: text});
      setState({outputs, loading:false, daysRemaining:getTrialDaysRemaining()});
    } else {
      setState({loading:false, error:"Something went wrong. Please try again."});
    }
  } catch(e) {
    setState({loading:false, error:"Connection error. Please try again."});
  }
}

function copyOutput() {
  navigator.clipboard.writeText(state.outputs[state.activeTool]);
  setState({copied:true});
  setTimeout(()=>setState({copied:false}), 2000);
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") el.className = v;
    else if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else el.setAttribute(k, v);
  }
  for (const child of children) {
    if (child == null) continue;
    if (typeof child === "string" || typeof child === "number") el.appendChild(document.createTextNode(child));
    else if (child instanceof Node) el.appendChild(child);
    else if (Array.isArray(child)) child.forEach(c => c instanceof Node && el.appendChild(c));
  }
  return el;
}

function renderHeader() {
  const days = state.daysRemaining;
  const badge = days > 0
    ? h("div",{className:"badge"}, `${days} day${days!==1?"s":""} left in trial`)
    : h("a",{href:LS_CHECKOUT_URL,target:"_blank",className:"badge",style:{textDecoration:"none",background:"linear-gradient(135deg,#0D9488,#0F766E)",color:"#fff"}}, "Unlock Full Access →");
  return h("div",{className:"header"},
    h("div",{className:"logo", onClick:()=>setState({page:"landing"})},
      h("div",{className:"logo-icon"},"🏡"),
      h("div",{},
        h("div",{className:"logo-text"},"Superhost Reply Suite"),
        h("div",{className:"logo-sub"},"AI Review Toolkit")
      )
    ),
    badge
  );
}

function renderTabs() {
  return h("div",{className:"tabs"},
    ...TOOLS.map(t => {
      const tab = h("button",{
        className:"tab"+(state.activeTool===t.id?" active":""),
        style:{color:state.activeTool===t.id?t.color:"#6B7280"},
        onClick:()=>setState({activeTool:t.id,error:""})
      }, t.icon+" "+t.label);
      if(state.outputs[t.id]) {
        const dot = h("span",{style:{width:"7px",height:"7px",borderRadius:"50%",background:"#0D9488",display:"inline-block"}});
        tab.appendChild(dot);
      }
      return tab;
    })
  );
}

function renderToneSelector(toolId) {
  const tone = state.fields[toolId].tone;
  return h("div",{className:"tones"},
    ...TONES.map(t => h("button",{
      className:"tone"+(tone===t?" active":""),
      onClick:()=>setField(toolId,"tone",t)
    }, TONE_ICONS[t]+" "+t))
  );
}

function renderSelect(toolId, key, options, placeholder) {
  const val = state.fields[toolId][key];
  const sel = h("select",{className:"select", onChange:e=>setField(toolId,key,e.target.value)},
    h("option",{value:""},placeholder),
    ...options.map(o=>h("option",{value:o},o))
  );
  sel.value = val;
  return sel;
}

function renderTextarea(toolId, key, placeholder, rows=5, max=1000) {
  const val = state.fields[toolId][key];
  const wrap = h("div",{});
  const ta = h("textarea",{className:"textarea",placeholder,rows,style:{minHeight:rows*24+"px"},
    onInput:e=>{
      const v = e.target.value.slice(0,max);
      e.target.value = v;
      setField(toolId,key,v);
    }
  });
  ta.value = val;
  const cc = h("div",{className:"char-count"},val.length+"/"+max);
  wrap.appendChild(ta);
  wrap.appendChild(cc);
  return wrap;
}

function renderInput(toolId, key, placeholder) {
  const inp = h("input",{className:"input",placeholder,type:"text",
    onInput:e=>setField(toolId,key,e.target.value)
  });
  inp.value = state.fields[toolId][key];
  return inp;
}

function renderOutputCard() {
  const output = state.outputs[state.activeTool];
  if (!output) return null;
  return h("div",{className:"output-card"},
    h("div",{className:"output-header"},
      h("div",{className:"output-label"},"✦ Your response"),
      h("button",{className:"copy-btn",onClick:copyOutput}, state.copied?"✓ Copied!":"Copy")
    ),
    h("div",{className:"output-text"},output),
    h("div",{className:"divider"}),
    h("button",{className:"regen-btn",onClick:generate},"↻ Regenerate"),
    h("div",{className:"tip"},"💡 ",h("strong",{},"Pro tip:")," Post your response within 48 hours. Speed signals attentiveness to future guests.")
  );
}

function renderGenerateBtn(can, label="Generate Response →") {
  const btn = h("button",{className:"btn",onClick:generate},
    state.loading ? h("span",{},h("span",{className:"spinner"}),"Crafting your response…") : label
  );
  if (!can || state.loading) btn.disabled = true;
  return btn;
}

function renderBadTool() {
  const f = state.fields.bad;
  const can = f.review.trim().length>10 && !!f.issueType;
  return h("div",{},
    h("div",{className:"field"},h("label",{className:"field-label"},"Property name ",h("span",{className:"field-optional"},"(optional)")),renderInput("bad","propertyName","e.g. SugarDolphin Beach Condo")),
    h("div",{className:"field"},h("label",{className:"field-label"},"Complaint type"),renderSelect("bad","issueType",BAD_ISSUES,"Select complaint type…")),
    h("div",{className:"field"},h("label",{className:"field-label"},"Guest review"),renderTextarea("bad","review","Paste the exact review text here…",5)),
    h("div",{className:"field",style:{marginBottom:"18px"}},h("label",{className:"field-label"},"Response tone"),renderToneSelector("bad")),
    renderGenerateBtn(can),
    renderOutputCard()
  );
}

function renderPositiveTool() {
  const f = state.fields.positive;
  const can = f.review.trim().length>10;
  return h("div",{},
    h("div",{className:"field"},h("label",{className:"field-label"},"Property name ",h("span",{className:"field-optional"},"(optional)")),renderInput("positive","propertyName","e.g. SugarDolphin Beach Condo")),
    h("div",{className:"field"},h("label",{className:"field-label"},"Guest review"),renderTextarea("positive","review","Paste the 5-star review here…",4)),
    h("div",{className:"field"},h("label",{className:"field-label"},"Anything specific to highlight? ",h("span",{className:"field-optional"},"(optional)")),renderInput("positive","stayHighlights","e.g. They mentioned their anniversary, loved the ocean view")),
    h("div",{className:"field",style:{marginBottom:"18px"}},h("label",{className:"field-label"},"Response tone"),renderToneSelector("positive")),
    renderGenerateBtn(can),
    renderOutputCard()
  );
}

function renderNeutralTool() {
  const f = state.fields.neutral;
  const can = f.review.trim().length>10;
  return h("div",{},
    h("div",{className:"field"},h("label",{className:"field-label"},"Property name ",h("span",{className:"field-optional"},"(optional)")),renderInput("neutral","propertyName","e.g. SugarDolphin Beach Condo")),
    h("div",{className:"field"},h("label",{className:"field-label"},"Guest review"),renderTextarea("neutral","review","Paste the neutral or mixed review here…",4)),
    h("div",{className:"field"},h("label",{className:"field-label"},"What you've since fixed ",h("span",{className:"field-optional"},"(optional)")),renderInput("neutral","yourContext","e.g. The AC issue was repaired the following day")),
    h("div",{className:"field",style:{marginBottom:"18px"}},h("label",{className:"field-label"},"Response tone"),renderToneSelector("neutral")),
    renderGenerateBtn(can),
    renderOutputCard()
  );
}

function renderDisputeTool() {
  const f = state.fields.dispute;
  const can = f.review.trim().length>10 && !!f.disputeGround;
  return h("div",{},
    h("div",{className:"dispute-note"},"⚖️ ",h("strong",{},"Dispute tool:")," Drafts a formal removal request to Airbnb support — not a public response."),
    h("div",{className:"field"},h("label",{className:"field-label"},"Property name ",h("span",{className:"field-optional"},"(optional)")),renderInput("dispute","propertyName","e.g. SugarDolphin Beach Condo")),
    h("div",{className:"field"},h("label",{className:"field-label"},"Grounds for dispute"),renderSelect("dispute","disputeGround",DISPUTE_GROUNDS,"Select grounds…")),
    h("div",{className:"field"},h("label",{className:"field-label"},"The review you want removed"),renderTextarea("dispute","review","Paste the exact review text here…",4)),
    h("div",{className:"field",style:{marginBottom:"18px"}},h("label",{className:"field-label"},"Your evidence ",h("span",{className:"field-optional"},"(optional)")),renderTextarea("dispute","yourContext","e.g. Guest threatened a bad review if we didn't comply. Screenshots available.",3,500)),
    renderGenerateBtn(can,"Draft Dispute Message →"),
    renderOutputCard()
  );
}

function renderPaywall() {
  if (!state.showPaywall) return null;
  return h("div",{className:"paywall-overlay"},
    h("div",{className:"paywall-box"},
      h("div",{style:{fontSize:"40px",marginBottom:"12px"}},"🏡"),
      h("div",{style:{fontSize:"22px",fontWeight:"800",color:"#111827",marginBottom:"8px"}},"Your trial has ended"),
      h("div",{style:{fontSize:"14px",color:"#6B7280",lineHeight:"1.6",marginBottom:"24px"}},"Unlock unlimited responses across all four tools."),
      h("div",{style:{background:"#F0FDFA",border:"1px solid #CCFBF1",borderRadius:"14px",padding:"20px",marginBottom:"24px"}},
        h("div",{className:"paywall-price"},"$12",h("span",{style:{fontSize:"16px",fontWeight:"500",color:"#6B7280"}},"/month")),
        h("div",{style:{fontSize:"13px",color:"#6B7280",marginTop:"4px"}},"Cancel anytime"),
        h("div",{className:"paywall-features"},
          ...["Unlimited responses across all 4 tools","Bad review responses","Positive & neutral review replies","Professional Airbnb dispute messages"].map(f=>
            h("div",{className:"paywall-feature"},h("span",{style:{color:"#0D9488",fontWeight:"700"}},"✓"),f)
          )
        )
      ),
      h("a",{href:LS_CHECKOUT_URL,target:"_blank",className:"unlock-btn"},"Unlock Full Access →"),
      h("button",{className:"maybe-later",onClick:()=>setState({showPaywall:false})},"Maybe later")
    )
  );
}

function renderLanding() {
  return h("div",{className:"landing"},
    h("div",{className:"header"},
      h("div",{className:"logo"},
        h("div",{className:"logo-icon"},"🏡"),
        h("div",{},
          h("div",{className:"logo-text"},"Superhost Reply Suite"),
          h("div",{className:"logo-sub"},"AI Review Toolkit")
        )
      ),
      h("button",{onClick:()=>setState({page:"app"}),style:{padding:"9px 18px",background:"#0D9488",color:"#fff",border:"none",borderRadius:"8px",fontSize:"13px",fontWeight:"600",cursor:"pointer",fontFamily:"inherit"}},"Try Free →")
    ),
    h("div",{className:"landing-hero"},
      h("div",{className:"landing-badge"},""✦ Built by a Superhost for Superhosts"),
      h("h1",{className:"landing-h1"},"Protect Your 5⭐️ Reputation"),
      h("p",{className:"landing-p",style:{fontWeight:"600",color:"#111827",marginBottom:"12px"}},"Every review is marketing. Make yours count."),
      h("p",{className:"landing-p"},"Turn difficult reviews, guest complaints, and Airbnb disputes into professional responses that build trust with future guests."),
      h("p",{className:"landing-p",style:{fontSize:"13px",fontStyle:"italic"}},"Created by a Superhost with multiple properties, including a Guest Favorite and a Top 10% property, and hundreds of guest reviews. After receiving a retaliatory one star review. Because future guests judge your response as much as the review itself."),
      h("button",{className:"cta-btn",onClick:()=>setState({page:"app"})},"Start your 3 day free trial →"),
      h("div",{className:"cta-sub"},"No credit card required · $12/month after trial"),
      h("div",{className:"features-grid"},
        ...[
          {icon:"🔴",title:"Bad Review Response",desc:"Turn a 1-star nightmare into a trust signal."},
          {icon:"⭐",title:"Positive Review Reply",desc:"Thank guests in a way that feels personal."},
          {icon:"🟡",title:"Neutral Review Follow-up",desc:"The 3-star review is the sneakiest threat."},
          {icon:"⚖️",title:"Dispute & Flag Drafter",desc:"Build a formal Airbnb removal request."},
        ].map(f=>h("div",{className:"feature-card"},
          h("div",{className:"feature-icon"},f.icon),
          h("div",{className:"feature-title"},f.title),
          h("div",{className:"feature-desc"},f.desc)
        ))
      ),
      h("div",{className:"pricing-box"},
        h("div",{className:"pricing-price"},"$12",h("span",{style:{fontSize:"16px",fontWeight:"500",color:"#6B7280"}},"/month")),
        h("div",{className:"pricing-sub"},"Unlimited responses · Cancel anytime"),
        h("button",{className:"cta-btn",style:{maxWidth:"100%",margin:"0"},onClick:()=>setState({page:"app"})},"Start your free 3-day trial →")
      )
    )
  );
}

function renderApp() {
  const tool = TOOLS.find(t=>t.id===state.activeTool);
  return h("div",{},
    renderPaywall(),
    renderHeader(),
    renderTabs(),
    h("div",{className:"main"},
      h("div",{className:"tool-hero"},
        h("div",{className:"tool-eyebrow",style:{color:tool.color}},tool.icon+" "+tool.label),
        h("div",{className:"tool-headline"},tool.headline),
        h("div",{className:"tool-sub"},tool.sub)
      ),
      h("div",{className:"card"},
        state.activeTool==="bad" ? renderBadTool() :
        state.activeTool==="positive" ? renderPositiveTool() :
        state.activeTool==="neutral" ? renderNeutralTool() :
        renderDisputeTool()
      ),
      state.error ? h("div",{className:"error"},state.error) : null,
      h("div",{className:"footer"},"Superhost Reply Suite · Built for serious hosts")
    )
  );
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(state.page==="landing" ? renderLanding() : renderApp());
}

// Initialize
getTrialStart();
state.daysRemaining = getTrialDaysRemaining();
render();
</script>
</body>
</html>
